<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lưu trữ file âm thanh</title>
</head>
<body>
  <h1>Lưu trữ file âm thanh</h1>

  <input type="file" id="fileInput" accept="audio/*" multiple />
  <button id="saveBtn">Lưu file đã chọn</button>

  <p id="status"></p>

  <h2>Danh sách file</h2>
  <div id="fileList"></div>

  <script>
    const dbName = "AudioStorageDB";
    const storeName = "audioFiles";
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = function (event) {
          const database = event.target.result;
          if (!database.objectStoreNames.contains(storeName)) {
            database.createObjectStore(storeName, { keyPath: "id" });
          }
        };

        request.onsuccess = function (event) {
          db = event.target.result;
          resolve(db);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    function saveFile(file) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        const store = tx.objectStore(storeName);

        const item = {
          id: Date.now() + "-" + Math.random().toString(16).slice(2),
          name: file.name,
          type: file.type,
          size: file.size,
          data: file,
          createdAt: new Date().toISOString()
        };

        const request = store.put(item);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    function getAllFiles() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        const request = store.getAll();

        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    function deleteFile(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        const store = tx.objectStore(storeName);
        const request = store.delete(id);

        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function refreshList() {
      const list = document.getElementById("fileList");
      list.innerHTML = "";

      const files = await getAllFiles();

      if (files.length === 0) {
        list.innerHTML = "<p>Chưa có file nào.</p>";
        return;
      }

      files.sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));

      files.forEach((item) => {
        const wrapper = document.createElement("div");

        const title = document.createElement("p");
        title.textContent = `${item.name} (${Math.round(item.size / 1024)} KB)`;

        const audio = document.createElement("audio");
        audio.controls = true;
        audio.src = URL.createObjectURL(item.data);

        const downloadLink = document.createElement("a");
        downloadLink.href = audio.src;
        downloadLink.download = item.name;
        downloadLink.textContent = "Tải xuống";

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Xóa";
        deleteBtn.onclick = async () => {
          await deleteFile(item.id);
          URL.revokeObjectURL(audio.src);
          refreshList();
        };

        wrapper.appendChild(title);
        wrapper.appendChild(audio);
        wrapper.appendChild(document.createElement("br"));
        wrapper.appendChild(downloadLink);
        wrapper.appendChild(document.createTextNode(" "));
        wrapper.appendChild(deleteBtn);
        wrapper.appendChild(document.createElement("hr"));

        list.appendChild(wrapper);
      });
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const input = document.getElementById("fileInput");
      const status = document.getElementById("status");

      if (!input.files || input.files.length === 0) {
        status.textContent = "Vui lòng chọn ít nhất một file âm thanh.";
        return;
      }

      try {
        for (const file of input.files) {
          await saveFile(file);
        }
        status.textContent = "Đã lưu file thành công.";
        input.value = "";
        await refreshList();
      } catch (error) {
        console.error(error);
        status.textContent = "Lưu file thất bại.";
      }
    });

    (async function init() {
      try {
        await openDB();
        await refreshList();
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "Không mở được cơ sở dữ liệu trình duyệt.";
      }
    })();
  </script>
</body>
</html>
